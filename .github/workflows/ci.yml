name: CI
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance backtrader
      - name: Run backtest
        run: |
          python -c "from backtest.run_backtest import run_backtest; run_backtest('AAPL')"
